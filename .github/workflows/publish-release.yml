name: Publish Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - stable
          - rc
          - beta
        default: stable
      pre_release_number:
        description: "Pre-release number (for rc/beta, leave empty for auto-increment)"
        required: false
        type: string
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-release-${{ github.ref }}
  cancel-in-progress: false

# =============================================================================
# JOB 0: BUILD-MACOS-APP
# - Build, sign, and notarize AgenShield.app on macOS before npm publish
# - Commits the freshly signed .app to the release branch so the sandbox
#   package ships with a notarized copy instead of the stale git-committed one
# =============================================================================
jobs:
  build-macos-app:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true)
    runs-on: macos-14
    environment: release
    env:
      NX_DAEMON: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Node version
        id: node-version
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.node-version.outputs.version }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build macOS menu bar app
        run: npx nx build shield-macos

      # Import Apple Developer ID certificate (conditional on secrets)
      - name: Import Apple certificate
        if: env.APPLE_CERTIFICATE_P12_BASE64 != ''
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_FILE=$(mktemp /tmp/cert.XXXXXX.p12)
          KEYCHAIN_FILE=$(mktemp /tmp/keychain.XXXXXX.keychain-db)
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_FILE"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security import "$CERT_FILE" -k "$KEYCHAIN_FILE" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security list-keychains -d user -s "$KEYCHAIN_FILE" $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_FILE=$KEYCHAIN_FILE" >> "$GITHUB_ENV"
          echo "CERT_FILE=$CERT_FILE" >> "$GITHUB_ENV"
          rm -f "$CERT_FILE"

      # Sign the .app with Developer ID
      - name: Sign AgenShield.app
        if: env.APPLE_CERTIFICATE_P12_BASE64 != ''
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          MAC_APP="dist/apps/shield-macos/Release/AgenShield.app"
          if [ -d "$MAC_APP" ] && [ -n "$APPLE_TEAM_ID" ]; then
            codesign --force --deep --sign "Developer ID Application: Frontegg ($APPLE_TEAM_ID)" \
              --identifier com.frontegg.AgenShield --timestamp --options runtime "$MAC_APP"
            echo "Signed $MAC_APP"
          fi

      # Notarize the .app (conditional on API key secret)
      - name: Notarize AgenShield.app
        if: env.APPLE_API_KEY_P8_BASE64 != ''
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          MAC_APP="dist/apps/shield-macos/Release/AgenShield.app"
          if [ ! -d "$MAC_APP" ]; then
            echo "AgenShield.app not found, skipping notarization"
            exit 0
          fi

          API_KEY_DIR=~/.private_keys
          mkdir -p "$API_KEY_DIR"
          API_KEY_FILE="$API_KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$API_KEY_FILE"

          APP_ZIP="/tmp/agenshield-app-notarize.zip"
          ditto -c -k --keepParent "$MAC_APP" "$APP_ZIP"
          xcrun notarytool submit "$APP_ZIP" \
            --key "$API_KEY_FILE" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait --timeout 10m
          xcrun stapler staple "$MAC_APP" || true
          rm -f "$APP_ZIP" "$API_KEY_FILE"

      # Commit the freshly built .app to the release branch
      - name: Update committed .app
        if: env.APPLE_CERTIFICATE_P12_BASE64 != ''
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
        run: |
          MAC_APP="dist/apps/shield-macos/Release/AgenShield.app"
          if [ ! -d "$MAC_APP" ]; then
            echo "AgenShield.app not found, skipping commit"
            exit 0
          fi

          rm -rf libs/sandbox/macos-app/AgenShield.app
          cp -R "$MAC_APP" libs/sandbox/macos-app/AgenShield.app

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain libs/sandbox/macos-app/)" ]; then
            git add libs/sandbox/macos-app/AgenShield.app
            git commit -m "chore: update signed AgenShield.app for npm distribution"
            git push origin HEAD
          else
            echo "No changes to AgenShield.app"
          fi

      # Cleanup temp keychain (always runs)
      - name: Cleanup signing artifacts
        if: always()
        run: |
          if [ -n "${KEYCHAIN_FILE:-}" ] && [ -f "$KEYCHAIN_FILE" ]; then
            security delete-keychain "$KEYCHAIN_FILE" 2>/dev/null || true
          fi

  # =============================================================================
  # JOB 1: PREPARE
  # - Determine version, build all packages, upload artifacts, output matrix
  # =============================================================================
  prepare:
    needs: build-macos-app
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    environment: release
    env:
      NX_DAEMON: "false"
    outputs:
      version: ${{ steps.version.outputs.version }}
      npm_tag: ${{ steps.version.outputs.npm_tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      release_type: ${{ steps.version.outputs.release_type }}
      branch: ${{ steps.context.outputs.branch }}
      release_line: ${{ steps.context.outputs.release_line }}
      matrix: ${{ steps.matrix.outputs.projects }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Node version
        id: node-version
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.node-version.outputs.version }}
          cache: "yarn"
          registry-url: "https://registry.npmjs.org/"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Determine release context
        id: context
        shell: bash
        run: |
          set -euo pipefail

          # Get current branch
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH="${GITHUB_REF#refs/heads/}"
          else
            BRANCH="${{ github.event.pull_request.base.ref }}"
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          # Validate branch is a release branch
          if [[ ! "$BRANCH" =~ ^release/[0-9]+\.[0-9]+\.x$ ]]; then
            echo "::error::This workflow must be run from a release/X.Y.x branch. Current branch: $BRANCH"
            exit 1
          fi

          # Extract release line (X.Y) from release/X.Y.x
          RELEASE_LINE=$(echo "$BRANCH" | sed 's/release\/\([0-9]*\.[0-9]*\).*/\1/')
          echo "release_line=$RELEASE_LINE" >> "$GITHUB_OUTPUT"

          echo "Branch: $BRANCH"
          echo "Release line: $RELEASE_LINE"

      - name: Determine version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_LINE="${{ steps.context.outputs.release_line }}"
          RELEASE_TYPE="${{ inputs.release_type || 'stable' }}"
          PRE_RELEASE_NUM="${{ inputs.pre_release_number }}"

          # Fetch all tags
          git fetch --tags

          # Use compute-next-patch script
          if [ -n "$PRE_RELEASE_NUM" ]; then
            VERSION=$(node scripts/compute-next-patch.mjs "$RELEASE_LINE" "$RELEASE_TYPE" "$PRE_RELEASE_NUM")
          else
            VERSION=$(node scripts/compute-next-patch.mjs "$RELEASE_LINE" "$RELEASE_TYPE")
          fi

          # Determine if this is a pre-release
          IS_PRERELEASE="false"
          NPM_TAG="latest"
          if [[ "$VERSION" == *"-rc."* ]]; then
            IS_PRERELEASE="true"
            NPM_TAG="rc"
          elif [[ "$VERSION" == *"-beta."* ]]; then
            IS_PRERELEASE="true"
            NPM_TAG="beta"
          fi

          # Check if tag already exists
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists!"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"

          echo "Version: $VERSION"
          echo "Release type: $RELEASE_TYPE"
          echo "Is prerelease: $IS_PRERELEASE"
          echo "NPM tag: $NPM_TAG"

      - name: Resolve projects and build matrix
        id: matrix
        run: |
          # Get synchronized libraries as JSON array for matrix
          # Use jq -c to compact JSON to single line (avoid multiline GITHUB_OUTPUT issues)
          PROJECTS_JSON=$(npx nx show projects -p tag:versioning:synchronized --type lib --json 2>/dev/null | jq -c '.' || echo "[]")

          # Fallback if no synchronized tag
          if [ "$PROJECTS_JSON" = "[]" ] || [ "$PROJECTS_JSON" = "null" ]; then
            PROJECTS_JSON=$(npx nx show projects --type lib --json 2>/dev/null | jq -c '.' || echo "[]")
          fi

          echo "projects=$PROJECTS_JSON" >> "$GITHUB_OUTPUT"
          echo "Projects matrix: $PROJECTS_JSON"

      - name: Update package versions
        run: |
          npx nx release version "${{ steps.version.outputs.version }}" \
            --git-tag=false --git-commit=false

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore(release): bump version to ${{ steps.version.outputs.version }}"
            git push origin HEAD
          fi

      - name: Build all packages
        run: |
          PROJECTS=$(echo '${{ steps.matrix.outputs.projects }}' | jq -r 'join(",")')
          npx nx run-many --targets=build --projects="$PROJECTS" --parallel=5

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: |
            libs/*/dist
          retention-days: 1

      - name: Prepare summary
        run: |
          echo "## Prepare Job Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release type | ${{ steps.version.outputs.release_type }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| NPM tag | \`${{ steps.version.outputs.npm_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pre-release | ${{ steps.version.outputs.is_prerelease }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ steps.context.outputs.branch }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Projects to publish:**" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.matrix.outputs.projects }}' | jq -r '.[] | "- \(.)"' >> "$GITHUB_STEP_SUMMARY"

  # =============================================================================
  # JOB 2: PUBLISH (Matrix)
  # - Each package publishes in its own job for independent re-runs
  # =============================================================================
  publish:
    needs: prepare
    if: ${{ inputs.dry_run != true && inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    environment: release
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout (for .nvmrc)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .nvmrc
          sparse-checkout-cone-mode: false

      - name: Get Node version
        id: node-version
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-packages

      - name: Setup Node for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.node-version.outputs.version }}
          registry-url: "https://registry.npmjs.org/"

      - name: Publish ${{ matrix.project }}
        run: |
          PROJECT="${{ matrix.project }}"
          NPM_TAG="${{ needs.prepare.outputs.npm_tag }}"

          # Determine dist path
          if [ -d "libs/$PROJECT/dist" ]; then
            DIST_PATH="libs/$PROJECT/dist"
          else
            echo "::error::No dist found for $PROJECT"
            exit 1
          fi

          echo "Publishing $PROJECT from $DIST_PATH with tag $NPM_TAG..."
          npm publish "$DIST_PATH" --access public --tag "$NPM_TAG"

          echo "Successfully published $PROJECT"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Job summary
        if: success()
        run: |
          echo "## Published ${{ matrix.project }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** \`${{ needs.prepare.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **NPM tag:** \`${{ needs.prepare.outputs.npm_tag }}\`" >> "$GITHUB_STEP_SUMMARY"

  # =============================================================================
  # JOB 2.5: BUILD-SEA (Matrix)
  # - Build platform-specific SEA binaries
  # =============================================================================
  build-sea:
    needs: prepare
    if: ${{ inputs.dry_run != true && inputs.dry_run != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            platform: darwin
            arch: arm64
          - runner: macos-13
            platform: darwin
            arch: x64
          - runner: ubuntu-latest
            platform: linux
            arch: x64
    runs-on: ${{ matrix.runner }}
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Node version
        id: node-version
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.node-version.outputs.version }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: libs/

      - name: Build UI
        run: npx nx build shield-ui

      # macOS: Build the SwiftUI menu bar app (non-fatal)
      - name: Build macOS menu bar app
        if: matrix.platform == 'darwin'
        continue-on-error: true
        run: npx nx build shield-macos

      # macOS: Import Apple Developer ID certificate (conditional on secrets)
      - name: Import Apple certificate
        if: matrix.platform == 'darwin' && env.APPLE_CERTIFICATE_P12_BASE64 != ''
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_FILE=$(mktemp /tmp/cert.XXXXXX.p12)
          KEYCHAIN_FILE=$(mktemp /tmp/keychain.XXXXXX.keychain-db)
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_FILE"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security import "$CERT_FILE" -k "$KEYCHAIN_FILE" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security list-keychains -d user -s "$KEYCHAIN_FILE" $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_FILE=$KEYCHAIN_FILE" >> "$GITHUB_ENV"
          echo "CERT_FILE=$CERT_FILE" >> "$GITHUB_ENV"
          rm -f "$CERT_FILE"

      # Determine signing flags
      - name: Determine signing flags
        id: signing
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SIGN_FLAGS=""
          if [ "${{ matrix.platform }}" = "darwin" ] && [ -n "$APPLE_CERTIFICATE_P12_BASE64" ] && [ -n "$APPLE_TEAM_ID" ]; then
            SIGN_FLAGS="--codesign-identity \"Developer ID Application: Frontegg ($APPLE_TEAM_ID)\" --entitlements tools/sea/entitlements.plist"
            echo "has_identity=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_identity=false" >> "$GITHUB_OUTPUT"
          fi
          echo "flags=$SIGN_FLAGS" >> "$GITHUB_OUTPUT"

      - name: Build multi-binary SEA
        run: node --experimental-strip-types tools/sea/build-all.mts --skip-nx --minify --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} ${{ steps.signing.outputs.flags }}

      # macOS: Notarize binaries and app (conditional on API key secret)
      - name: Notarize binaries
        if: matrix.platform == 'darwin' && steps.signing.outputs.has_identity == 'true' && env.APPLE_API_KEY_P8_BASE64 != ''
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          API_KEY_DIR=~/.private_keys
          mkdir -p "$API_KEY_DIR"
          API_KEY_FILE="$API_KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$API_KEY_FILE"

          # Create a zip for notarization from the archive contents
          VERSION="${{ needs.prepare.outputs.version }}"
          ARCHIVE="dist/sea/agenshield-${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"
          NOTARIZE_ZIP="/tmp/agenshield-notarize.zip"

          # Extract and re-zip for notarization (notarytool requires .zip)
          STAGING=$(mktemp -d)
          tar -xzf "$ARCHIVE" -C "$STAGING"
          ditto -c -k --keepParent "$STAGING" "$NOTARIZE_ZIP"
          rm -rf "$STAGING"

          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --key "$API_KEY_FILE" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait --timeout 10m

          rm -f "$NOTARIZE_ZIP"

          # Notarize AgenShield.app separately if it exists
          MAC_APP="dist/apps/shield-macos/Release/AgenShield.app"
          if [ -d "$MAC_APP" ]; then
            APP_ZIP="/tmp/agenshield-app-notarize.zip"
            ditto -c -k --keepParent "$MAC_APP" "$APP_ZIP"
            xcrun notarytool submit "$APP_ZIP" \
              --key "$API_KEY_FILE" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER_ID" \
              --wait --timeout 10m
            # Staple the notarization ticket to the app
            xcrun stapler staple "$MAC_APP" || true
            rm -f "$APP_ZIP"
          fi

          echo "API_KEY_FILE=$API_KEY_FILE" >> "$GITHUB_ENV"

      # Cleanup temp keychain and API key (always runs)
      - name: Cleanup signing artifacts
        if: always() && matrix.platform == 'darwin'
        run: |
          if [ -n "${KEYCHAIN_FILE:-}" ] && [ -f "$KEYCHAIN_FILE" ]; then
            security delete-keychain "$KEYCHAIN_FILE" 2>/dev/null || true
          fi
          if [ -n "${API_KEY_FILE:-}" ] && [ -f "$API_KEY_FILE" ]; then
            rm -f "$API_KEY_FILE"
          fi

      - name: Upload SEA artifact
        uses: actions/upload-artifact@v4
        with:
          name: sea-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/sea/agenshield-*.tar.gz
            dist/sea/checksums.sha256
          retention-days: 1

      - name: Job summary
        if: success()
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "## Built SEA binary (${{ matrix.platform }}-${{ matrix.arch }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** \`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Platform:** ${{ matrix.platform }}/${{ matrix.arch }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Signed:** ${{ steps.signing.outputs.has_identity }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -f dist/sea/checksums.sha256 ]; then
            echo "- **Checksum:**" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat dist/sea/checksums.sha256 >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  # =============================================================================
  # JOB 3: FINALIZE
  # - Create git tag and GitHub release after all publishes succeed
  # =============================================================================
  finalize:
    needs: [prepare, publish, build-sea]
    if: ${{ inputs.dry_run != true && inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download SEA artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sea-*
          path: /tmp/sea-artifacts
          merge-multiple: true

      - name: Merge SEA checksums
        run: |
          MERGED="/tmp/sea-artifacts/checksums.sha256"
          # Collect all individual checksum files and merge
          find /tmp/sea-artifacts -name 'checksums.sha256' -exec cat {} \; | sort -u > "$MERGED.merged" || true
          if [ -s "$MERGED.merged" ]; then
            mv "$MERGED.merged" "$MERGED"
            echo "Merged checksums:"
            cat "$MERGED"
          fi

      - name: Get previous version
        id: prev_version
        run: |
          # Find the latest stable tag before this release for generating diff
          git fetch --tags

          CURRENT_VERSION="${{ needs.prepare.outputs.version }}"
          RELEASE_LINE="${{ needs.prepare.outputs.release_line }}"

          # Find the previous stable tag within the same release line
          # Filter to vX.Y.* where X.Y matches the release line, excluding pre-releases
          PREV_TAG=$(git tag -l "v${RELEASE_LINE}.*" --sort=-v:refname \
            | grep -E "^v${RELEASE_LINE}\.[0-9]+$" \
            | grep -v "^v${CURRENT_VERSION}$" \
            | head -1)

          # Fallback to any previous stable tag if no matching release line tag
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag in release line ${RELEASE_LINE}, falling back to global search"
            PREV_TAG=$(git tag -l 'v*' --sort=-v:refname \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | grep -v "^v${CURRENT_VERSION}$" \
              | head -1)
          fi

          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "Previous version tag: $PREV_TAG"

      - name: Generate diff for AI changelog
        id: diff
        if: ${{ needs.prepare.outputs.is_prerelease != 'true' }}
        run: |
          PREV_TAG="${{ steps.prev_version.outputs.prev_tag }}"

          if [ -n "$PREV_TAG" ]; then
            # Generate diff of source files for AI analysis (limit to 50KB)
            git diff "$PREV_TAG"..HEAD -- '**/*.ts' '**/*.tsx' '**/*.js' '**/*.json' \
              ':!**/package-lock.json' ':!**/yarn.lock' ':!**/*.spec.ts' ':!**/*.test.ts' \
              | head -c 50000 > /tmp/changes.diff

            echo "Generated diff from $PREV_TAG to HEAD"
            echo "Diff size: $(wc -c < /tmp/changes.diff) bytes"
          else
            echo "No previous tag found, skipping diff generation"
            touch /tmp/changes.diff
          fi

      - name: Generate AI changelog
        id: ai_changelog
        if: ${{ needs.prepare.outputs.is_prerelease != 'true' && steps.prev_version.outputs.prev_tag != '' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          PREV_TAG="${{ steps.prev_version.outputs.prev_tag }}"

          # Skip if no OpenAI key configured
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OpenAI API key not configured, skipping AI changelog"
            exit 0
          fi

          # Build user message content
          USER_CONTENT="Generate release notes for AgenShield version $VERSION (previous: $PREV_TAG).

          Code diff:
          $(cat /tmp/changes.diff | head -c 40000)"

          # Use jq to safely construct JSON with proper escaping
          jq -n \
            --arg user_content "$USER_CONTENT" \
            '{
              "model": "gpt-4o",
              "messages": [
                {
                  "role": "system",
                  "content": "You are a technical writer creating professional release notes for AgenShield, a security daemon and policy enforcement system for AI agents. Write in a clear, professional marketing tone.\n\nOutput a markdown changelog with categorized sections:\n- **Features** (new capabilities)\n- **Improvements** (enhancements to existing features)\n- **Bug Fixes** (if any)\n- **Breaking Changes** (if any, highlight clearly)\n\nUse bullet points. Be specific but concise."
                },
                {
                  "role": "user",
                  "content": $user_content
                }
              ],
              "max_tokens": 2000,
              "temperature": 0.3
            }' > /tmp/prompt.json

          # Call OpenAI API with HTTP status capture
          HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/openai_response.json -X POST https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d @/tmp/prompt.json)

          RESPONSE=$(cat /tmp/openai_response.json)

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::warning::OpenAI API returned HTTP $HTTP_CODE"
            echo "Response: $RESPONSE"
            echo "has_changelog=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract content
          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ -n "$CONTENT" ]; then
            echo "$CONTENT" > /tmp/changelog.md
            echo "AI changelog generated successfully"
            echo "has_changelog=true" >> "$GITHUB_OUTPUT"
          else
            echo "Failed to generate AI changelog"
            echo "has_changelog=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release body
        id: release_body
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          RELEASE_TYPE="${{ needs.prepare.outputs.release_type }}"
          RELEASE_LINE="${{ needs.prepare.outputs.release_line }}"
          BRANCH="${{ needs.prepare.outputs.branch }}"
          IS_PRERELEASE="${{ needs.prepare.outputs.is_prerelease }}"

          # Start with header
          cat > /tmp/release-body.md << EOF
          ## Release v$VERSION

          **Release type:** $RELEASE_TYPE
          **Release line:** $RELEASE_LINE.x
          **Branch:** $BRANCH

          ### Installation

          **Binary (recommended):**
          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/v$VERSION/install.sh | sh
          \`\`\`

          **npm:**
          \`\`\`bash
          npm install agenshield@$VERSION
          \`\`\`

          EOF

          # Add pre-release note if applicable
          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "> **Note:** This is a pre-release version." >> /tmp/release-body.md
            echo "" >> /tmp/release-body.md
          fi

          # Add AI-generated changelog if available
          if [ -f /tmp/changelog.md ] && [ -s /tmp/changelog.md ]; then
            echo "### What's New" >> /tmp/release-body.md
            echo "" >> /tmp/release-body.md
            cat /tmp/changelog.md >> /tmp/release-body.md
            echo "" >> /tmp/release-body.md
          fi

          echo "Release body prepared"

      - name: Create and push git tag
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="v$VERSION"
          BRANCH="${{ needs.prepare.outputs.branch }}"

          # Fetch latest to ensure we tag the committed version
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git pull origin "$BRANCH"

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

          echo "Created and pushed tag: $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          generate_release_notes: true
          body_path: /tmp/release-body.md
          files: |
            /tmp/sea-artifacts/agenshield-*.tar.gz
            /tmp/sea-artifacts/checksums.sha256
            tools/sea/install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Final summary
        run: |
          echo "## Release Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ needs.prepare.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | \`v${{ needs.prepare.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release type | ${{ needs.prepare.outputs.release_type }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| NPM tag | \`${{ needs.prepare.outputs.npm_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pre-release | ${{ needs.prepare.outputs.is_prerelease }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All packages published successfully!" >> "$GITHUB_STEP_SUMMARY"

  # =============================================================================
  # JOB 4: DRY RUN SUMMARY
  # - Shows what would be published without actually publishing
  # =============================================================================
  dry-run-summary:
    needs: prepare
    if: ${{ inputs.dry_run == true || inputs.dry_run == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Dry run summary
        run: |
          echo "## Dry Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> **This was a dry run. No packages were published.**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ needs.prepare.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release type | ${{ needs.prepare.outputs.release_type }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| NPM tag | \`${{ needs.prepare.outputs.npm_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pre-release | ${{ needs.prepare.outputs.is_prerelease }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ needs.prepare.outputs.branch }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Packages that would be published:**" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ needs.prepare.outputs.matrix }}' | jq -r '.[] | "- \(.)"' >> "$GITHUB_STEP_SUMMARY"
