name: On Push

on:
  push:
    branches:
      - main
      - "next/**"
      - "release/**"
  pull_request:
    branches:
      - main
      - "next/**"
      - "release/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions for security (least-privilege principle)
permissions:
  contents: read

jobs:
  # Shared setup job that other jobs can reference
  setup:
    name: "Setup"
    runs-on: ubuntu-latest
    outputs:
      node-version: ${{ steps.node-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Node version
        id: node-version
        run: echo "version=$(cat .nvmrc)" >> $GITHUB_OUTPUT

  # Lint and format checks (fast, independent)
  lint:
    name: "Lint & Format Checks"
    needs: setup
    runs-on: ubuntu-latest
    env:
      NX_DAEMON: "false"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.setup.outputs.node-version }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Restore Nx cache
        uses: ./.github/actions/nx-cache-restore

      - name: Set Nx SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Run linter
        run: npx nx affected -t lint

      - name: Run prettier
        run: npx prettier --check .
        continue-on-error: true

  # Build all libraries
  build:
    name: "Build Libraries"
    needs: setup
    runs-on: ubuntu-latest
    env:
      NX_DAEMON: "false"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.setup.outputs.node-version }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Restore Nx cache
        uses: ./.github/actions/nx-cache-restore

      - name: Set Nx SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Build libraries
        id: build
        continue-on-error: true
        run: npx nx run-many -t build --parallel 5 --exclude='tag:native'

      - name: Reset Nx cache on failure
        if: steps.build.outcome == 'failure'
        run: npx nx reset

      - name: Retry build without cache
        if: steps.build.outcome == 'failure'
        run: npx nx run-many -t build --parallel 5 --exclude='tag:native'

      - name: Save Nx cache
        if: always()
        uses: ./.github/actions/nx-cache-save

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            libs/*/dist
            dist/
          retention-days: 1

  # Unit tests (depends on build)
  unit-tests:
    name: "Unit Tests"
    needs: [setup, build]
    runs-on: ubuntu-latest
    env:
      NX_DAEMON: "false"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.setup.outputs.node-version }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Restore Nx cache
        uses: ./.github/actions/nx-cache-restore

      - name: Set Nx SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Run unit tests
        id: tests
        continue-on-error: true
        run: npx nx affected -t test --passWithNoTests --codeCoverage

      - name: Generate test summary
        if: always()
        run: |
          echo "## Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.tests.outcome }}" == "success" ]; then
            echo "> ✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "> ❌ Some tests failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Coverage table
          has_coverage=false
          for f in test-output/coverage/libs/*/coverage-summary.json; do
            [ -f "$f" ] || continue
            if [ "$has_coverage" = false ]; then
              echo "### Coverage" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Library | Statements | Branches | Functions | Lines |" >> $GITHUB_STEP_SUMMARY
              echo "|---------|-----------|----------|-----------|-------|" >> $GITHUB_STEP_SUMMARY
              has_coverage=true
            fi
            lib=$(echo "$f" | sed 's|.*/libs/||;s|/coverage.*||')
            stmts=$(jq -r '.total.statements.pct' "$f")
            branches=$(jq -r '.total.branches.pct' "$f")
            funcs=$(jq -r '.total.functions.pct' "$f")
            lines=$(jq -r '.total.lines.pct' "$f")
            echo "| $lib | ${stmts}% | ${branches}% | ${funcs}% | ${lines}% |" >> $GITHUB_STEP_SUMMARY
          done

          if [ "$has_coverage" = false ]; then
            echo "_No coverage data produced (no affected libraries with tests)._" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

  # Performance tests (depends on build)
  perf-tests:
    name: "Performance Tests"
    needs: [setup, build]
    runs-on: ubuntu-latest
    env:
      NX_DAEMON: "false"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.setup.outputs.node-version }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Restore Nx cache
        uses: ./.github/actions/nx-cache-restore

      - name: Run performance tests
        id: perf
        continue-on-error: true
        run: npx nx run-many -t perf --parallel 1

      - name: Generate perf summary
        if: always()
        run: |
          echo "## Performance Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.perf.outcome }}" == "success" ]; then
            echo "> ✅ All benchmarks passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "> ❌ Some benchmarks failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Coverage table from perf tests
          has_coverage=false
          for f in test-output/performance/libs/*/coverage-summary.json; do
            [ -f "$f" ] || continue
            if [ "$has_coverage" = false ]; then
              echo "### Coverage" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Library | Statements | Branches | Functions | Lines |" >> $GITHUB_STEP_SUMMARY
              echo "|---------|-----------|----------|-----------|-------|" >> $GITHUB_STEP_SUMMARY
              has_coverage=true
            fi
            lib=$(echo "$f" | sed 's|.*/libs/||;s|/coverage.*||')
            stmts=$(jq -r '.total.statements.pct' "$f")
            branches=$(jq -r '.total.branches.pct' "$f")
            funcs=$(jq -r '.total.functions.pct' "$f")
            lines=$(jq -r '.total.lines.pct' "$f")
            echo "| $lib | ${stmts}% | ${branches}% | ${funcs}% | ${lines}% |" >> $GITHUB_STEP_SUMMARY
          done

          if [ "$has_coverage" = false ]; then
            echo "_No coverage data produced._" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if perf tests failed
        if: steps.perf.outcome == 'failure'
        run: exit 1

  # macOS platform validation (tests + native builds)
  macos-validation:
    name: "macOS Validation"
    needs: [setup, build]
    runs-on: macos-14
    env:
      NX_DAEMON: "false"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.setup.outputs.node-version }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Restore Nx cache
        uses: ./.github/actions/nx-cache-restore
        with:
          cache-prefix: "nx-cache-macos"

      - name: Run unit tests
        id: tests
        continue-on-error: true
        run: npx nx run-many -t test --passWithNoTests --codeCoverage

      - name: Build macOS menu bar app
        id: macos-app
        continue-on-error: true
        run: npx nx build shield-macos

      # Import Apple Developer ID certificate for code signing (if available)
      - name: Import Apple certificate
        if: env.APPLE_CERTIFICATE_P12_BASE64 != ''
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_FILE=$(mktemp /tmp/cert.XXXXXX.p12)
          KEYCHAIN_FILE=$(mktemp /tmp/keychain.XXXXXX.keychain-db)
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_FILE"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security import "$CERT_FILE" -k "$KEYCHAIN_FILE" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security list-keychains -d user -s "$KEYCHAIN_FILE" $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_FILE=$KEYCHAIN_FILE" >> "$GITHUB_ENV"
          rm -f "$CERT_FILE"

      - name: Determine signing flags
        id: signing
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CODESIGN_ORG: ${{ secrets.APPLE_CODESIGN_ORG }}
        run: |
          SIGN_FLAGS=""
          if [ -n "$APPLE_CERTIFICATE_P12_BASE64" ] && [ -n "$APPLE_TEAM_ID" ]; then
            SIGN_FLAGS="--codesign-identity \"Developer ID Application: $APPLE_CODESIGN_ORG ($APPLE_TEAM_ID)\" --entitlements tools/sea/entitlements.plist"
          fi
          echo "flags=$SIGN_FLAGS" >> "$GITHUB_OUTPUT"

      - name: Build SEA binaries (darwin/arm64)
        id: sea-build
        run: >-
          node --experimental-strip-types tools/sea/build-all.mts
          --skip-nx
          --platform darwin --arch arm64
          ${{ steps.signing.outputs.flags }}

      - name: Upload SEA binaries
        if: steps.sea-build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: sea-darwin-arm64
          path: |
            dist/sea/agenshield-*.tar.gz
            dist/sea/checksums.sha256
          retention-days: 7

      - name: Cleanup signing artifacts
        if: always()
        run: |
          if [ -n "${KEYCHAIN_FILE:-}" ] && [ -f "$KEYCHAIN_FILE" ]; then
            security delete-keychain "$KEYCHAIN_FILE" 2>/dev/null || true
          fi

      - name: Save Nx cache
        if: always()
        uses: ./.github/actions/nx-cache-save
        with:
          cache-prefix: "nx-cache-macos"

      - name: Generate summary
        if: always()
        run: |
          echo "## macOS Validation (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.tests.outcome }}" == "success" ]; then
            echo "> ✅ All tests passed on macOS" >> $GITHUB_STEP_SUMMARY
          else
            echo "> ❌ Some tests failed on macOS" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          has_coverage=false
          for f in test-output/coverage/libs/*/coverage-summary.json; do
            [ -f "$f" ] || continue
            if [ "$has_coverage" = false ]; then
              echo "#### Coverage" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Library | Statements | Branches | Functions | Lines |" >> $GITHUB_STEP_SUMMARY
              echo "|---------|-----------|----------|-----------|-------|" >> $GITHUB_STEP_SUMMARY
              has_coverage=true
            fi
            lib=$(echo "$f" | sed 's|.*/libs/||;s|/coverage.*||')
            stmts=$(jq -r '.total.statements.pct' "$f")
            branches=$(jq -r '.total.branches.pct' "$f")
            funcs=$(jq -r '.total.functions.pct' "$f")
            lines=$(jq -r '.total.lines.pct' "$f")
            echo "| $lib | ${stmts}% | ${branches}% | ${funcs}% | ${lines}% |" >> $GITHUB_STEP_SUMMARY
          done
          if [ "$has_coverage" = false ]; then
            echo "_No coverage data produced._" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### macOS App (Xcode)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.macos-app.outcome }}" == "success" ]; then
            echo "> ✅ AgenShield.app built successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "> ⚠️ AgenShield.app build failed (non-blocking)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### SEA Binaries (darwin/arm64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.sea-build.outcome }}" == "success" ]; then
            echo "> ✅ CLI, Daemon, and Broker binaries built successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "> ❌ SEA binary build failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
